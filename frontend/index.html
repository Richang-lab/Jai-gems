<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Jai Gems Art & Crafts — Manufacturing Management System" />
  <title>Jai Gems — Login</title>
  <link rel="stylesheet" href="/css/variables.css" />
  <link rel="stylesheet" href="/css/base.css" />
  <link rel="stylesheet" href="/css/components.css" />
  <link rel="stylesheet" href="/css/pages.css" />
  <link rel="icon" type="image/png" href="/assets/logo.png" />
  <script defer src="/_vercel/insights/script.js"></script>
</head>

<body>
  <div class="login-page">
    <div class="login-card card-glass">
      <div class="login-logo">
        <img src="/assets/logo.png" alt="Jai Gems Art & Crafts Logo" onerror="this.style.display='none'" />
        <h1>Jai Gems</h1>
        <p>Art & Crafts — Management System</p>
      </div>

      <div class="login-error" id="loginError"></div>

      <form class="login-form" id="loginForm">
        <div class="form-group">
          <label class="form-label" for="email">Email Address</label>
          <input class="form-input" type="email" id="email" name="email" placeholder="Enter your email" required
            autocomplete="email" />
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <div style="position: relative;">
            <input class="form-input" type="password" id="password" name="password" placeholder="Enter your password"
              required autocomplete="current-password" style="padding-right: 2.5rem;" />
            <button type="button" id="togglePassword"
              style="position: absolute; right: 0.75rem; top: 50%; transform: translateY(-50%); background: none; border: none; color: var(--text-muted); cursor: pointer; padding: 0; display: flex; transition: color 0.2s;">
              <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                <circle cx="12" cy="12" r="3"></circle>
              </svg>
            </button>
          </div>
        </div>

        <button type="submit" class="btn btn-primary login-btn" id="loginBtn">
          <span>Sign In</span>
        </button>
      </form>

      <p style="text-align: center; margin-top: 1.5rem; font-size: 0.75rem; color: var(--text-muted);">
        &copy; 2026 Jai Gems Art & Crafts. All rights reserved.
      </p>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script>
    // Redirect if already logged in
    if (Auth.isLoggedIn()) {
      window.location.href = '/dashboard.html';
    }

    const form = document.getElementById('loginForm');
    const errorEl = document.getElementById('loginError');
    const loginBtn = document.getElementById('loginBtn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorEl.classList.remove('active');
      loginBtn.disabled = true;
      loginBtn.innerHTML = '<div class="spinner"></div><span>Signing in...</span>';

      try {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        await Auth.login(email, password);
      } catch (err) {
        errorEl.textContent = err.message;
        errorEl.classList.add('active');
        loginBtn.disabled = false;
        loginBtn.innerHTML = '<span>Sign In</span>';
      }
    });

    const togglePassword = document.getElementById('togglePassword');
    const passwordInput = document.getElementById('password');

    togglePassword.addEventListener('click', function () {
      const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
      passwordInput.setAttribute('type', type);

      if (type === 'text') {
        this.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>';
        this.style.color = 'var(--text-primary)';
      } else {
        this.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>';
        this.style.color = 'var(--text-muted)';
      }
    });
  </script>
</body>

</html>
